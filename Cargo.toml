[package]
name = "pcl2rtf"
version = "0.1.0"
edition = "2024"
rust-version = "1.94"
authors = ["warlock <internalmike@gmail.com>"]
description = "Converts PCL printer file generated by old DOS text processors to modern RTF."
readme = "README.md"
documentation = "https://docs.rs/pcl2rtf/"
keywords = ["pcl", "dos", "rtf", "lexicon", "pdf"]
categories = ["command-line-utilities", "encoding"]
license = "MIT OR Apache-2.0"
repository = "https://github.com/A1-Triard/pcl2rtf"

[profile.dev]
panic = "abort"

[profile.release]
codegen-units = 1
lto = true
opt-level = "z"
panic = "abort"
strip = true

[dependencies]
either = { version = "1.15.0", default-features = false }
iter-identify_first_last = { version = "0.2.3", default-features = false }

[badges]
maintenance = { status = "actively-developed" }
